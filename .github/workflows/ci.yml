name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  client:
    name: Client — lint + build + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Audit (high+critical only)
        run: npm audit --omit=dev --audit-level=high

  server:
    name: Server — syntax + tests + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Syntax check every .js
        run: |
          find . -path ./node_modules -prune -o -name '*.js' -print \
            | xargs -I{} node --check {}
      - name: Tests
        run: npm test
      - name: Audit (high+critical only)
        run: npm audit --omit=dev --audit-level=high

  secrets-hygiene:
    name: No .env committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refuse any tracked .env
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "::error::A .env file is tracked in git. Remove it and rotate the secrets."
            exit 1
          fi
          echo "No tracked .env files — OK."
